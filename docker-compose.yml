version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: codeshare-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --notify-keyspace-events Ex
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - codeshare-net
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codeshare-server
    ports:
      - '3001:3001'
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codeshare-net
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: codeshare-client
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules # This protects the container's Linux-specific binaries
    env_file:
      - ./client/.env
    environment:
      - VITE_API_URL=http://localhost:3001
      - WATCHPACK_POLLING=true # Helps Vite HMR work reliably inside Docker volumes
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      # Simplified: using wget which comes pre-installed in alpine
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s # Gives Vite time to bundle before checking
    networks:
      - codeshare-net
    restart: unless-stopped

networks:
  codeshare-net:
    driver: bridge

volumes:
  redis-data:
